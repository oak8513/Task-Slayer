<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>TASK SLAYER</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#030a03" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Task Slayer" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="faces/healthy.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#030a03;
    --bg2:#061306;
    --panel:#0a1e0a;
    --panel2:#102910;
    --ink:#39ff14;
    --ink-dim:#1f8f10;
    --ink-deep:#0c4a0a;
    --ink-hot:#aaff6a;
    --danger:#ff3b2f;
    --danger-dim:#8a1a12;
    --amber:#ffb347;
    --chrome:#0f2a0f;
    --pixel:4px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#000;color:var(--ink);font-family:'Share Tech Mono','VT323',ui-monospace,monospace;overflow:hidden;height:100%;overscroll-behavior:none}
  body{
    background:
      radial-gradient(ellipse at center, #041604 0%, #010401 70%, #000 100%);
  }
  #root{position:fixed;inset:0}

  /* Scanlines + CRT curvature */
  .crt::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,0.28) 2px 3px);
    mix-blend-mode:multiply;
  }
  .crt::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:9998;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
  }
  .flicker{animation:flicker 6s infinite steps(60)}
  @keyframes flicker{
    0%,99%{opacity:1}
    50%{opacity:.97}
    72%{opacity:.94}
  }

  .stage{
    position:absolute;inset:0;
    display:grid;
    grid-template-rows: 1fr 240px;
    padding:18px;
    gap:14px;
  }

  /* Main terminal window */
  .screen{
    position:relative;
    border:3px solid var(--ink-dim);
    outline:2px solid #000;
    background:
      linear-gradient(180deg, rgba(16,41,16,0.35), rgba(3,10,3,0.9)),
      #020602;
    box-shadow: inset 0 0 60px rgba(57,255,20,0.08), 0 0 0 4px #000;
    overflow:hidden;
    display:grid;
    grid-template-rows: auto 1fr;
    grid-template-columns: minmax(0, 1fr);
  }
  .screen-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 12px;
    border-bottom:2px solid var(--ink-deep);
    background:linear-gradient(180deg, #0b210b, #061406);
    font-family:'Press Start 2P',monospace;
    font-size:10px;letter-spacing:1px;
    text-transform:uppercase;
    color:var(--ink-hot);
    text-shadow:0 0 6px rgba(57,255,20,0.6);
  }
  .screen-header .title{display:flex;gap:10px;align-items:center}
  .screen-header .dot{width:8px;height:8px;background:var(--ink);box-shadow:0 0 8px var(--ink)}
  .screen-body{
    padding:14px 16px;
    overflow:auto;
    scrollbar-width:thin;
    scrollbar-color: var(--ink-dim) #000;
  }
  .screen-body::-webkit-scrollbar{width:10px;background:#000;border-left:2px solid var(--ink-deep)}
  .screen-body::-webkit-scrollbar-thumb{background:var(--ink-dim);border:1px solid #000}

  /* HUD bottom status bar */
  .hud{
    position:relative;
    display:grid;
    grid-template-columns: 260px 1fr 380px;
    gap:10px;
    border:3px solid var(--ink-dim);
    outline:2px solid #000;
    background:
      linear-gradient(180deg,#0c220c,#041004);
    padding:10px;
    box-shadow: inset 0 0 40px rgba(57,255,20,0.07), 0 0 0 4px #000;
  }
  .hud::before{
    content:"";position:absolute;inset:4px;border:1px dashed var(--ink-deep);pointer-events:none
  }

  .hud-cell{
    position:relative;
    border:2px solid var(--ink-deep);
    background:
      repeating-linear-gradient(45deg, rgba(15,42,15,0.6) 0 6px, rgba(8,22,8,0.6) 6px 12px);
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .hud-cell .label{
    font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:1.5px;
    color:var(--ink-hot);text-shadow:0 0 4px rgba(170,255,106,0.5)
  }
  .hud-cell .value{
    font-family:'VT323',monospace;
    font-size:42px;line-height:1;
    color:var(--ink);
    text-shadow:0 0 8px rgba(57,255,20,0.55);
  }

  /* Face frame */
  .face-frame{
    display:flex;align-items:center;justify-content:center;
    border:2px solid var(--ink-dim);
    outline:2px solid #000;
    background:#000;
    width:150px;height:150px;
    image-rendering:pixelated;
    overflow:hidden;
    position:relative;
    padding:0;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
  }
  .face-frame img{display:block;width:100%;height:100%;object-fit:cover;image-rendering:pixelated}
  .face-frame::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,0.22) 2px 3px);
  }
  .face-plate{
    display:grid;
    grid-template-columns: auto 1fr;
    align-items:center;
    gap:12px;
  }
  .face-plate .face-frame{flex-shrink:0}
  .face-plate .face-stats{min-width:0}
  .face-stats{
    flex:1;display:flex;flex-direction:column;gap:8px;
  }
  .stat-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .stat-label{font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:1.5px;color:var(--ink-hot)}
  .stat-num{font-family:'VT323',monospace;font-size:36px;line-height:.9;color:var(--ink);text-shadow:0 0 8px rgba(57,255,20,0.55)}
  .stat-num.low{color:var(--danger);text-shadow:0 0 8px rgba(255,59,47,0.65)}

  /* Pixel face – CSS grid */
  .pix-face{
    display:grid;
    grid-template-columns: repeat(16, var(--pixel));
    grid-template-rows: repeat(16, var(--pixel));
    gap:0;
    filter: drop-shadow(0 0 3px rgba(57,255,20,0.3));
  }
  .pix-face .p{width:var(--pixel);height:var(--pixel)}

  /* SVG face + ASCII face containers */
  .svg-face{width:120px;height:120px}
  .ascii-face{
    font-family:'Share Tech Mono',monospace;
    font-size:11px;line-height:1;white-space:pre;
    color:var(--ink);text-shadow:0 0 4px rgba(57,255,20,0.5);
    text-align:center;
  }

  /* Center HUD: ammo / level / score grid — auto-fit so streak+medals cells fit */
  .hud-center{
    display:grid;grid-template-columns: repeat(auto-fit, minmax(68px, 1fr));
    gap:8px;
  }
  .hud-center .hud-cell{padding:8px 10px}
  .hud-center .value{font-size:36px}

  /* Task rows */
  .task-list{display:flex;flex-direction:column;gap:8px;overflow:hidden}
  .task{
    position:relative;
    display:grid;
    grid-template-columns: 36px 1fr auto auto;
    align-items:center;gap:12px;
    padding:10px 12px;
    border:2px solid var(--ink-deep);
    background:linear-gradient(90deg, rgba(15,42,15,0.5), rgba(6,19,6,0.5));
    color:var(--ink);
    transition: background .12s, border-color .12s, transform .12s;
  }
  .task:hover{border-color:var(--ink-dim);background:linear-gradient(90deg, rgba(30,70,30,0.45), rgba(10,30,10,0.55))}
  .task.overdue{border-color:var(--danger-dim);background:linear-gradient(90deg, rgba(70,18,12,0.55), rgba(20,6,4,0.5))}
  .task.overdue .t-title{color:#ffb9b2;text-shadow:0 0 6px rgba(255,59,47,0.4)}
  .task.boss{border-color:var(--amber);box-shadow:inset 0 0 24px rgba(255,179,71,0.15), 0 0 0 1px rgba(255,179,71,0.25)}
  .task.done{opacity:.35; text-decoration:line-through; border-style:dashed}

  .checkbox{
    width:22px;height:22px;border:2px solid var(--ink);background:#000;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-family:'Press Start 2P',monospace;font-size:12px;color:var(--ink-hot);
    position:relative;
  }
  .checkbox:hover{background:#072207}
  .checkbox.boss{border-color:var(--amber);color:var(--amber)}

  .t-title{font-family:'VT323',monospace;font-size:24px;line-height:1;letter-spacing:.5px}
  .t-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:2px}
  .chip{
    font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;
    padding:4px 6px;border:1px solid var(--ink-deep);color:var(--ink-dim);background:#030a03;
    text-transform:uppercase
  }
  .chip.hot{color:var(--danger);border-color:var(--danger-dim)}
  .chip.boss{color:var(--amber);border-color:var(--amber)}
  .chip.rec{color:var(--ink-hot);border-color:var(--ink-dim)}

  .t-due{font-family:'VT323',monospace;font-size:20px;color:var(--ink-hot);white-space:nowrap}
  .t-due.hot{color:var(--danger)}
  .t-actions{display:flex;gap:4px}
  .iconbtn{
    width:26px;height:26px;border:1px solid var(--ink-deep);background:#030a03;color:var(--ink);
    font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .iconbtn:hover{background:#0a1f0a;border-color:var(--ink-dim);color:var(--ink-hot)}

  /* Boss HP bar */
  .boss-hp{
    margin-top:4px;height:8px;border:1px solid var(--amber);background:#120801;position:relative;
    grid-column: 2 / -1;
  }
  .boss-hp > span{
    display:block;height:100%;background:repeating-linear-gradient(90deg,#ffb347 0 6px,#d47a0a 6px 8px);
    transition:width .3s ease;
  }
  .boss-hp-label{
    font-family:'Press Start 2P',monospace;font-size:7px;color:var(--amber);letter-spacing:1.2px;
    grid-column: 2 / -1;display:flex;justify-content:space-between;margin-top:4px
  }

  /* Add bar */
  .add-bar{
    display:grid;grid-template-columns: 1fr 150px 150px auto;gap:8px;
    padding:10px;margin-bottom:10px;
    border:2px solid var(--ink-deep);background:#050f05;
  }
  .input, select{
    width:100%;
    background:#000;color:var(--ink);border:2px solid var(--ink-deep);
    font-family:'VT323',monospace;font-size:20px;padding:6px 8px;outline:none;
    caret-color:var(--ink-hot);
  }
  .input:focus,select:focus{border-color:var(--ink-dim);box-shadow:0 0 8px rgba(57,255,20,0.25) inset}
  .input::placeholder{color:var(--ink-deep)}
  .btn{
    font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:1px;
    padding:10px 12px;background:#072207;color:var(--ink-hot);
    border:2px solid var(--ink-dim);cursor:pointer;text-transform:uppercase;
  }
  .btn:hover{background:#0f3a0f;box-shadow:inset 0 0 12px rgba(57,255,20,0.25)}
  .btn.danger{color:#ffb9b2;border-color:var(--danger-dim);background:#1a0604}
  .btn.danger:hover{background:#2a0906}
  .btn.boss{color:var(--amber);border-color:var(--amber);background:#1c1002}

  /* Date picker */
  .datepick-wrap{position:relative}
  .datepick-trigger{
    width:100%;text-align:left;cursor:pointer;
    background:#000;color:var(--ink);border:2px solid var(--ink-deep);
    font-family:'VT323',monospace;font-size:20px;padding:6px 8px;
    display:flex;align-items:center;justify-content:space-between;gap:6px;
  }
  .datepick-trigger:hover{border-color:var(--ink-dim)}
  .datepick-trigger .caret{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--ink-dim)}
  .datepick-pop{
    position:fixed;z-index:9000;
    width:260px;background:#030a03;border:2px solid var(--ink-dim);
    box-shadow:0 0 14px rgba(57,255,20,0.25), inset 0 0 14px rgba(57,255,20,0.08);
    padding:10px;
  }
  .datepick-head{
    display:flex;align-items:center;justify-content:space-between;
    font-family:'Press Start 2P',monospace;font-size:9px;color:var(--ink-hot);
    letter-spacing:1px;margin-bottom:8px;
  }
  .datepick-nav{
    background:#072207;color:var(--ink-hot);border:2px solid var(--ink-dim);
    font-family:'Press Start 2P',monospace;font-size:9px;
    width:24px;height:24px;cursor:pointer;padding:0;line-height:1;
  }
  .datepick-nav:hover{background:#0f3a0f}
  .datepick-grid{
    display:grid;grid-template-columns:repeat(7,1fr);gap:2px;
  }
  .datepick-dow{
    font-family:'Press Start 2P',monospace;font-size:7px;color:var(--ink-dim);
    text-align:center;padding:4px 0;letter-spacing:1px;
  }
  .datepick-day{
    font-family:'VT323',monospace;font-size:16px;color:var(--ink);
    background:transparent;border:1px solid transparent;padding:4px 0;
    text-align:center;cursor:pointer;aspect-ratio:1/1;
    display:flex;align-items:center;justify-content:center;
  }
  .datepick-day:hover{border-color:var(--ink-dim);background:#0a1e0a}
  .datepick-day.muted{color:var(--ink-deep)}
  .datepick-day.today{color:var(--amber);border-color:var(--ink-deep)}
  .datepick-day.selected{
    background:var(--ink-dim);color:#000;border-color:var(--ink-hot);
    box-shadow:0 0 6px rgba(57,255,20,0.6);
  }
  .datepick-time{
    display:flex;align-items:center;gap:6px;margin-top:10px;
    padding-top:8px;border-top:1px solid var(--ink-deep);
    font-family:'Press Start 2P',monospace;font-size:8px;color:var(--ink-dim);
    letter-spacing:1px;
  }
  .datepick-time input{
    flex:1;background:#000;color:var(--ink);border:2px solid var(--ink-deep);
    font-family:'VT323',monospace;font-size:18px;padding:4px 6px;outline:none;
  }
  .datepick-time input:focus{border-color:var(--ink-dim)}
  .datepick-foot{
    display:flex;gap:6px;margin-top:10px;
  }
  .datepick-foot .btn{flex:1;padding:8px 6px;font-size:8px}
  .btn.ghost{background:transparent;border-color:var(--ink-deep);color:var(--ink)}

  /* Empty state */
  .empty{
    text-align:center;padding:40px 12px;color:var(--ink-dim);
    font-family:'VT323',monospace;font-size:22px;
  }
  .empty .big{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--ink-hot);display:block;margin-bottom:10px;letter-spacing:2px}

  /* Search bar */
  .search-bar{
    display:flex;align-items:center;gap:6px;
    border:2px solid var(--ink-deep);background:#020a02;
    padding:4px 8px;margin-bottom:8px;
  }
  .search-bar .search-prompt{
    font-family:'Press Start 2P',monospace;font-size:8px;color:var(--ink-dim);letter-spacing:1px;
  }
  .search-bar .search-input{
    flex:1;border:none;background:transparent;font-size:18px;padding:2px 0;
  }
  .search-bar .search-input:focus{box-shadow:none}
  .search-bar .search-clear{
    background:transparent;border:1px solid var(--ink-deep);color:var(--ink-dim);
    cursor:pointer;font-family:'Press Start 2P',monospace;font-size:8px;padding:4px 6px;
  }
  .search-bar .search-clear:hover{color:var(--ink-hot);border-color:var(--ink-dim)}

  /* Date chips (modal quick-set) */
  .date-chips{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
  .date-chip{
    font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;
    padding:5px 7px;background:#051805;color:var(--ink-dim);
    border:1px solid var(--ink-deep);cursor:pointer;text-transform:uppercase;
  }
  .date-chip:hover{color:var(--ink-hot);border-color:var(--ink-dim);background:#0a2a0a}

  /* Tag filter strip (below tabs) */
  .tag-strip{
    display:flex;align-items:center;gap:4px;flex-wrap:wrap;
    border:1px dashed var(--ink-deep);background:#040c04;
    padding:4px 8px;margin-bottom:8px;
  }
  .tag-strip-label{
    font-family:'Press Start 2P',monospace;font-size:7px;color:var(--ink-dim);
    letter-spacing:1px;margin-right:4px;
  }
  .tag-chip{
    font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;
    padding:4px 7px;background:transparent;color:var(--ink-dim);
    border:1px solid var(--ink-deep);cursor:pointer;text-transform:uppercase;
  }
  .tag-chip:hover{filter:brightness(1.3)}
  .tag-chip.all{color:var(--ink);border-color:var(--ink-deep)}
  .tag-chip.all.active{background:var(--ink);color:#000}
  .tag-chip.active{font-weight:bold}

  /* Inline tag chip inside task meta */
  .chip.tag{background:#030a03}

  /* Sub-tasks */
  .sub-toggle{
    background:#030a03;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:7px;
    letter-spacing:1px;padding:4px 6px;color:var(--ink-dim);border:1px solid var(--ink-deep);
    text-transform:uppercase;
  }
  .sub-toggle:hover{color:var(--ink-hot);border-color:var(--ink-dim)}
  .sub-open{
    background:transparent;border:1px dashed var(--ink-deep);color:var(--ink-dim);
    font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;
    padding:3px 6px;margin-top:6px;cursor:pointer;text-transform:uppercase;
  }
  .sub-open:hover{color:var(--ink-hot);border-color:var(--ink-dim)}
  .subtask-list{
    grid-column: 2 / -1;
    margin-top:6px;padding-left:10px;
    border-left:2px dashed var(--ink-deep);
    display:flex;flex-direction:column;gap:3px;
  }
  .subtask{
    display:grid;grid-template-columns: 18px 1fr auto;align-items:center;gap:6px;
    padding:2px 4px;
  }
  .subtask.done .sub-title{opacity:0.45;text-decoration:line-through}
  .sub-checkbox{
    width:16px;height:16px;border:1px solid var(--ink-deep);background:#000;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-family:'Press Start 2P',monospace;font-size:9px;color:var(--ink-hot);
  }
  .sub-checkbox:hover{background:#072207}
  .sub-checkbox.on{background:#0a1f0a;border-color:var(--ink-dim)}
  .sub-title{font-family:'VT323',monospace;font-size:18px;color:var(--ink)}
  .sub-del{
    background:transparent;border:none;color:var(--ink-deep);cursor:pointer;
    font-family:'Press Start 2P',monospace;font-size:8px;padding:2px 4px;
  }
  .sub-del:hover{color:var(--danger)}
  .subtask-add{
    display:grid;grid-template-columns: 18px 1fr auto;align-items:center;gap:6px;
    padding:2px 4px;margin-top:2px;
  }
  .sub-plus{
    font-family:'Press Start 2P',monospace;font-size:10px;color:var(--ink-dim);
    text-align:center;
  }
  .sub-input{
    background:transparent;border:none;border-bottom:1px solid var(--ink-deep);
    color:var(--ink);font-family:'VT323',monospace;font-size:16px;outline:none;padding:2px 0;
  }
  .sub-input:focus{border-bottom-color:var(--ink-dim)}
  .sub-add-btn{
    font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:1px;
    padding:3px 6px;background:#051805;color:var(--ink-hot);
    border:1px solid var(--ink-deep);cursor:pointer;
  }
  .sub-add-btn:hover:not(:disabled){background:#0a2a0a;border-color:var(--ink-dim)}
  .sub-add-btn:disabled{opacity:0.35;cursor:not-allowed}

  /* Tabs */
  .tabs{display:flex;gap:0;border-bottom:2px solid var(--ink-deep);margin-bottom:10px}
  .tab{
    font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:1px;
    padding:8px 12px;background:transparent;color:var(--ink-dim);border:none;cursor:pointer;
    border-bottom:2px solid transparent;margin-bottom:-2px;text-transform:uppercase
  }
  .tab.active{color:var(--ink-hot);border-bottom-color:var(--ink)}
  .tab.hot{animation:tabHot 1.6s ease-in-out infinite}
  @keyframes tabHot{
    0%,100%{text-shadow:none}
    50%{text-shadow:0 0 8px var(--ink-hot), 0 0 16px var(--ink)}
  }
  .tab .count{color:var(--ink);margin-left:6px;opacity:.7}

  /* Arsenal (rewards) */
  .arsenal{display:flex;flex-direction:column;gap:10px}
  .arsenal-banner{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 10px;border:1px solid var(--ink-deep);background:#061306;
  }
  .arsenal-title{
    font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--ink);letter-spacing:1px;
  }
  .btn.small{font-size:9px;padding:6px 10px}
  .btn.tiny{font-size:10px;padding:4px 8px;min-width:28px}
  .weapon-grid{
    display:grid;grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:10px;
  }
  .weapon-card{
    position:relative;
    display:grid;grid-template-rows:auto 1fr auto;
    padding:10px;gap:8px;
    background:linear-gradient(180deg, #0a1e0a, #040c04);
    border:2px solid var(--ink-deep);
    transition:all .2s;

  .tweaks{

    overflow:hidden;

    overflow:hidden;

    .hud{
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto;
      padding:6px; gap:6px;
      border-width:2px;
      min-width:0;
    }
    .hud-center{display:none}
    .face-plate{
      display:grid;grid-template-columns: 88px 1fr;
      gap:8px; padding:4px;
    }
    .face-frame{width:88px;height:88px}
    .face-stats .stat-num{font-size:18px}
    .face-stats .stat-label{font-size:7px}
    /* Mobile: hide verbose face stats — face itself conveys health */
    .face-plate{grid-template-columns: 1fr !important; justify-items:center; padding:2px !important}
    .face-stats{display:none}
    .dog-cell{min-height:0}
    .dog-body{grid-template-columns: 96px 1fr; padding:6px; gap:6px}
    .dog-header{font-size:6px;padding:4px 6px}
    .dog-bar{grid-template-columns: 26px 1fr 26px; font-size:12px}
    .dog-bar-label{font-size:6px}
    .dog-meta{font-size:11px}
    .dog-btn{font-size:8px;padding:10px 4px;min-height:36px}

    /* COMPACT (default on mobile): only the dog face is shown */
    .dog-panel[data-expanded="false"] .dog-header{display:none}
    .dog-panel[data-expanded="false"] .dog-body{
      grid-template-columns: 1fr; padding:2px;
    }
    .dog-panel[data-expanded="false"] .dog-stats{display:none}
    .dog-panel[data-expanded="false"] .dog-actions{display:none}
    .dog-panel[data-expanded="false"] .dog-window{min-height:88px; cursor:pointer}
    .dog-panel[data-expanded="false"] .dog-tap-hint{
      display:block;position:absolute;bottom:4px;right:6px;
      font-family:'Press Start 2P',monospace;font-size:6px;
      color:var(--ink-dim);letter-spacing:2px;opacity:0.7;
      animation: dogTapBlink 2s ease-in-out infinite;
      pointer-events:none;z-index:5;
    }
    @keyframes dogTapBlink{
      0%,100%{opacity:0.3}
      50%{opacity:0.9}
    }
    .dog-tap-hint{display:none}

    /* EXPANDED on mobile: show everything, overlay on top of tasks */
    .dog-panel[data-expanded="true"]{
      position:fixed; top:8vh; left:6vw; right:6vw; bottom:auto;
      max-height:80vh; overflow:auto;
      z-index:500;
      border:2px solid var(--ink);
      box-shadow:0 0 40px rgba(57,255,20,0.4), 0 20px 60px rgba(0,0,0,0.8);
      background:linear-gradient(180deg, #061106 0%, #040a04 100%);
    }
    .dog-panel[data-expanded="true"] .dog-header{
      display:flex; padding:6px 10px; font-size:8px;
    }
    .dog-panel[data-expanded="true"] .dog-window{
      cursor:pointer;
    }
    .dog-panel[data-expanded="true"] .dog-window::after{
      content:'✕ TAP TO CLOSE';
      position:absolute;top:4px;right:6px;
      font-family:'Press Start 2P',monospace;font-size:6px;
      color:var(--ink-hot);letter-spacing:2px;
      pointer-events:none;z-index:5;
      text-shadow:0 0 4px rgba(170,255,106,0.6);
    }
    .dog-panel[data-expanded="true"] .dog-body{
      grid-template-columns: 140px 1fr; gap:8px; padding:8px;
    }
    .dog-panel[data-expanded="true"] .dog-window{
      min-height:140px;
    }
    .screen-header{padding:6px 8px; font-size:8px; flex-wrap:wrap; gap:4px}
    .screen-header .title{min-width:0}
    .screen-header > div:last-child{gap:6px !important; font-size:7px !important}
    .screen-header .clock-mini{display:none}
    .banner{font-size:11px;letter-spacing:1.5px}
    .screen-body{padding:8px 10px; min-width:0; overflow-x:hidden}
    .add-bar{
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap:4px; padding:6px;
      min-width:0;
      margin-bottom:6px;
    }
    .add-bar > *{min-width:0}
    .add-bar .input{font-size:13px; padding:6px 6px; height:32px}
    .add-bar .btn{font-size:8px; padding:6px 4px}
    .add-bar button[type="submit"]{grid-column:1/-1}
    .task{grid-template-columns: 30px 1fr auto auto; gap:6px; padding:8px 6px; font-size:13px}
    .task .checkbox{width:32px;height:32px}
    .task .meta{display:none}
    .tabs{overflow-x:auto; overflow-y:hidden; scrollbar-width:none; flex-wrap:nowrap}
    .tabs::-webkit-scrollbar{display:none}
    .tab{padding:8px 8px;font-size:8px; flex-shrink:0; letter-spacing:0.5px}
    .weapon-grid{grid-template-columns:1fr}
    .weapon-icon-frame{height:72px}
    .tweaks-panel{width:min(92vw, 320px) !important}
  }
  @media (max-width: 480px){
    .dog-body{grid-template-columns: 72px 1fr; gap:4px}
    .face-plate{grid-template-columns: 72px 1fr; gap:6px}
    .face-frame{width:72px;height:72px}
    .face-stats .stat-num{font-size:15px}
    .dog-btn{font-size:7px;padding:8px 2px;min-height:32px}
  }

  /* Modal */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:7000;
    display:flex;align-items:center;justify-content:center;
  }
  .modal{
    width:min(520px,92vw);
    background:#050f05;border:3px solid var(--ink-dim);outline:2px solid #000;
    padding:14px 16px;
    box-shadow:0 0 40px rgba(57,255,20,.15);
  }
  .modal h3{
    margin:0 0 10px;font-family:'Press Start 2P',monospace;font-size:12px;letter-spacing:1.5px;color:var(--ink-hot)
  }
  .fld{display:flex;flex-direction:column;gap:4px;margin:8px 0}
  .fld label{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--ink-dim);letter-spacing:1.2px}
  .row{display:flex;gap:8px}
  .row > *{flex:1}
  .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}

  /* Title banner in screen header */
  .banner{
    font-family:'Press Start 2P',monospace;font-size:14px;letter-spacing:3px;color:var(--ink-hot);
    text-shadow:0 0 8px rgba(170,255,106,.65), 0 0 24px rgba(57,255,20,.3);
  }

  /* Batch 6: undo toast */
  .undo-toast{
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    z-index:8500;display:flex;align-items:center;gap:10px;
    background:#051205;border:2px solid var(--ink-dim);
    padding:8px 14px;
    font-family:'Press Start 2P',monospace;font-size:8px;color:var(--ink);
    box-shadow:0 0 20px rgba(57,255,20,0.2);
    white-space:nowrap;max-width:90vw;
    animation:fadeInUp 0.2s ease;
  }
  @keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

  /* Batch 6: bottom nav */
  .bottom-nav{
    position:fixed;bottom:0;left:0;right:0;z-index:2000;
    display:flex;
    background:linear-gradient(180deg,#061406,#030903);
    border-top:2px solid var(--ink-dim);
    box-shadow:0 -2px 12px rgba(57,255,20,0.1);
  }
  .bottom-nav .tab{
    flex:1;display:flex;flex-direction:column;align-items:center;
    padding:10px 2px;font-size:6px;text-align:center;letter-spacing:0.5px;
    border-bottom:none !important;margin-bottom:0 !important;
    border-top:2px solid transparent;
  }
  .bottom-nav .tab.active{
    color:var(--ink-hot);border-top-color:var(--ink);border-bottom:none !important;
  }
</style>
</head>
